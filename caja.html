<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MRS TPV · Caja</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div id="navbar-app"></div> 

  <section id="abrir-caja" class="container" style="display:none; margin-top:5rem;">
    <article>
      <header>
        <h3 style="margin:0;">🚀 Apertura de Turno</h3>
      </header>
      <p>Introduce el efectivo inicial disponible en el cajón para comenzar.</p>
      <label for="fondo-inicial">
        Efectivo Inicial (€)
        <input type="number" id="fondo-inicial" step="0.01" placeholder="0.00" autofocus>
      </label>
      <button id="btn-abrir-caja" class="primary">🟢 Confirmar y Abrir Caja</button>
    </article>
  </section>

  <div id="zona-caja" style="display:none; margin-top: 1rem;">
    <main class="container-fluid" style="padding: 0 20px;">
      <div class="grid caja-grid">
        
        <section>
          <article class="venta-card">
            <header style="padding: 0.5rem 1rem; margin-bottom: 1rem;">
              <h4 style="margin:0;">🛒 Venta Actual</h4>
            </header>
            
            <div style="max-height: 400px; overflow-y: auto;">
              <table id="tabla-venta" class="modern-table">
                <thead>
                  <tr>
                    <th>Producto</th>
                    <th class="text-center">Cant.</th>
                    <th>Precio</th>
                    <th class="right">Total</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  </tbody>
              </table>
            </div>

            <div class="resumen-cobro">
              <div class="grid resumen-detalle">
                <div>Base: <strong id="subtotal">0.00 €</strong></div>
                <div>IVA (21%): <strong id="total-iva">0.00 €</strong></div>
              </div>
              <div class="total-line">
                <span>TOTAL</span>
                <strong id="total-venta">0.00 €</strong>
              </div>
            </div>
          </article>
        </section>

        <section>
          <article class="panel-card">
            <div class="section-title" style="margin-bottom: 0.5rem;">
              <i data-lucide="layers" style="color: var(--primary);"></i>
              <span>Familias</span>
            </div>
            <div id="categorias"></div>
            <hr style="margin: 1rem 0;">
            <div class="section-title" style="margin-bottom: 0.5rem;">
              <i data-lucide="package" style="color: var(--primary);"></i>
              <span>Productos</span>
            </div>
            <div id="productos"></div>
          </article>
        </section>
        
      </div>
    </main>

    <footer class="cobro-footer">
      <div class="container">
        <div class="grid" style="align-items: end;">
          
          <div>
            <h6>Forma de Pago</h6>
            <div class="pago-buttons">
              <button class="btn-pago" id="btn-pago-efectivo" data-pago-type="efectivo">💶 Efectivo</button>
              <button class="btn-pago" id="btn-pago-tarjeta" data-pago-type="tarjeta">💳 Tarjeta</button>
            </div>
            <p style="margin:10px 0 0 0;"><small>Seleccionado:</small> <strong id="pago-seleccionado">—</strong></p>
          </div>

          <div id="bloque-efectivo" style="display:none;">
            <label style="margin-bottom:0;">Entregado (€)
              <input type="number" id="efectivo-entregado" step="0.01" placeholder="0.00">
            </label>
            <p style="margin:0;">Cambio: <strong id="cambio" style="color: var(--primary); font-size: 1.2rem;">0.00 €</strong></p>
          </div>

          <div>
            <button class="btn-cobrar" id="btn-cobrar">
              💾 COBRAR TICKET
            </button>
          </div>

        </div>
      </div>
    </footer>
  </div>

  <script src="js/navbar.js" type="module"></script>
  <script src="js/auth.js" type="module"></script>
  <script src="js/caja.js" type="module"></script>

</body>
</html>
